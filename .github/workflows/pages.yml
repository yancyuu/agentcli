name: Deploy Agent Runbook to GitHub Pages

# Deploys the agent runbook (agent-manual.md, llms.txt, index.html) to GitHub Pages.

on:
  push:
    branches:
      - main
      - spec/11-team-isolation-containers
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build agent runbook
        run: node scripts/build-pages.mjs

      - name: Verify generated site
        run: |
          test -s _site/index.html
          test -s _site/agent-manual.md
          test -s _site/llms.txt
          test -f _site/docs/screenshots/openhermit/team-list.png
          grep -q "openHermit Agent Runbook" _site/index.html
          grep -q "Feishu/Lark CLI team isolation" _site/agent-manual.md

      - name: Set up Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
