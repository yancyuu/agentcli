name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          pnpm pkg set version="$VERSION"

      - name: Build app
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: quant-jump-pro
          SENTRY_PROJECT: electron
        run: pnpm build

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --draft=false 2>/dev/null || echo "Release $TAG already exists, skipping creation"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: |
            out/renderer
            dist-electron
          retention-days: 1

  release-mac:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            dist_command: pnpm dist:mac:arm64
          - arch: x64
            runner: macos-15-intel
            dist_command: pnpm dist:mac:x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          pnpm pkg set version="$VERSION"

      - name: Build app (macOS ${{ matrix.arch }})
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: quant-jump-pro
          SENTRY_PROJECT: electron
        run: pnpm build

      - name: Verify packaged inputs (macOS ${{ matrix.arch }})
        run: |
          test -f dist-electron/main/index.cjs
          test -f dist-electron/preload/index.js
          test -f out/renderer/index.html
          test -f mcp-server/dist/index.js

      - name: Package (macOS ${{ matrix.arch }})
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          HAS_APPLE_SIGNING=0
          if [ -n "${CSC_LINK:-}" ] && \
             [ -n "${CSC_KEY_PASSWORD:-}" ] && \
             [ -n "${APPLE_ID:-}" ] && \
             [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && \
             [ -n "${APPLE_TEAM_ID:-}" ]; then
            HAS_APPLE_SIGNING=1
          fi

          if [ "$HAS_APPLE_SIGNING" = "1" ]; then
            echo "Building signed and notarized macOS package"
            ${{ matrix.dist_command }} --publish never
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            echo "::error::Apple signing/notarization secrets are required for tagged macOS releases."
            echo "::error::Configure CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID."
            exit 1
          else
            echo "Apple signing secrets are not configured; building unsigned macOS package for non-release run"
            ${{ matrix.dist_command }} --publish never -c.mac.identity=null -c.mac.notarize=false
          fi

      - name: Validate packaged bundle (macOS ${{ matrix.arch }})
        run: |
          node ./scripts/electron-builder/verifyBundle.cjs "release/mac-${{ matrix.arch }}/Hermit.app" darwin ${{ matrix.arch }}
          codesign --verify --deep --strict --verbose=2 "release/mac-${{ matrix.arch }}/Hermit.app"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            spctl --assess --type execute --verbose=4 "release/mac-${{ matrix.arch }}/Hermit.app"
          fi

      - name: Upload assets to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for f in release/*.dmg release/*.zip; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1 || \
              (sleep 5 && gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1) || \
              echo "WARNING: failed to upload $f, continuing..."
          done

  release-win:
    needs: [build]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          pnpm pkg set version="$VERSION"

      - name: Build app (Windows)
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: quant-jump-pro
          SENTRY_PROJECT: electron
        run: pnpm build

      - name: Verify packaged inputs (Windows)
        shell: bash
        run: |
          test -f dist-electron/main/index.cjs
          test -f dist-electron/preload/index.js
          test -f out/renderer/index.html
          test -f mcp-server/dist/index.js

      - name: Package (Windows)
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm dist:win --publish never

      - name: Validate packaged bundle (Windows)
        shell: bash
        run: node ./scripts/electron-builder/verifyBundle.cjs "release/win-unpacked" win32 x64

      - name: Upload assets to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for f in release/*.exe; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1 || \
              (sleep 5 && gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1) || \
              echo "WARNING: failed to upload $f, continuing..."
          done

  release-linux:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          pnpm pkg set version="$VERSION"

      - name: Build app (Linux)
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: quant-jump-pro
          SENTRY_PROJECT: electron
        run: pnpm build

      - name: Verify packaged inputs (Linux)
        run: |
          test -f dist-electron/main/index.cjs
          test -f dist-electron/preload/index.js
          test -f out/renderer/index.html
          test -f mcp-server/dist/index.js

      - name: Package (Linux)
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm dist:linux --publish never

      - name: Validate packaged bundle (Linux)
        run: node ./scripts/electron-builder/verifyBundle.cjs "release/linux-unpacked" linux x64

      - name: Upload assets to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          TAG="${GITHUB_REF#refs/tags/}"
          ls -la release/ || true
          for f in release/*.AppImage release/*.deb release/*.rpm release/*.pacman; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1 || \
              (sleep 5 && gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1) || \
              echo "WARNING: failed to upload $f, continuing..."
          done

  publish-updater-metadata:
    needs: [release-mac, release-win, release-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Publish canonical updater metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_DATE="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"

          sha512_base64() {
            openssl dgst -sha512 -binary "$1" | openssl base64 -A
          }

          file_size() {
            wc -c < "$1" | tr -d '[:space:]'
          }

          download_asset() {
            local name="$1"
            curl -fSL -o "$name" "https://github.com/${REPO}/releases/download/${TAG}/${name}"
          }

          # Canonical Windows feed
          WIN_EXE="Hermit.Setup.${VERSION}.exe"
          download_asset "$WIN_EXE"
          WIN_SHA="$(sha512_base64 "$WIN_EXE")"
          WIN_SIZE="$(file_size "$WIN_EXE")"
          cat > latest.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${WIN_EXE}
              sha512: ${WIN_SHA}
              size: ${WIN_SIZE}
          path: ${WIN_EXE}
          sha512: ${WIN_SHA}
          releaseDate: '${RELEASE_DATE}'
          EOF

          # Canonical Linux feed
          LINUX_APPIMAGE="Hermit-${VERSION}.AppImage"
          download_asset "$LINUX_APPIMAGE"
          LINUX_SHA="$(sha512_base64 "$LINUX_APPIMAGE")"
          LINUX_SIZE="$(file_size "$LINUX_APPIMAGE")"
          cat > latest-linux.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${LINUX_APPIMAGE}
              sha512: ${LINUX_SHA}
              size: ${LINUX_SIZE}
          path: ${LINUX_APPIMAGE}
          sha512: ${LINUX_SHA}
          releaseDate: '${RELEASE_DATE}'
          EOF

          # Canonical macOS feed.
          # electron-updater on GitHub still consumes a single latest-mac.yml, so we
          # publish the Apple Silicon feed here and suppress Intel auto-update in-app
          # until we switch to universal packaging or an arch-aware provider.
          MAC_ZIP="Hermit-${VERSION}-arm64-mac.zip"
          MAC_DMG="Hermit-${VERSION}-arm64.dmg"
          download_asset "$MAC_ZIP"
          download_asset "$MAC_DMG"
          MAC_ZIP_SHA="$(sha512_base64 "$MAC_ZIP")"
          MAC_ZIP_SIZE="$(file_size "$MAC_ZIP")"
          MAC_DMG_SHA="$(sha512_base64 "$MAC_DMG")"
          MAC_DMG_SIZE="$(file_size "$MAC_DMG")"
          cat > latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${MAC_ZIP}
              sha512: ${MAC_ZIP_SHA}
              size: ${MAC_ZIP_SIZE}
            - url: ${MAC_DMG}
              sha512: ${MAC_DMG_SHA}
              size: ${MAC_DMG_SIZE}
          path: ${MAC_ZIP}
          sha512: ${MAC_ZIP_SHA}
          releaseDate: '${RELEASE_DATE}'
          EOF

          gh release upload "${TAG}" latest.yml latest-linux.yml latest-mac.yml --repo "${REPO}" --clobber

      - name: Remove intermediate release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          delete_asset() {
            local name="$1"
            echo "Deleting intermediate asset: ${name}"
            gh release delete-asset "${TAG}" "${name}" --repo "${REPO}" --yes 2>/dev/null || true
          }

          while IFS= read -r name; do
            [ -n "$name" ] || continue
            case "$name" in
              agent-teams-runtime-*) delete_asset "$name" ;;
              *.blockmap) delete_asset "$name" ;;
            esac
          done < <(gh release view "${TAG}" --repo "${REPO}" --json assets --jq '.assets[].name')
