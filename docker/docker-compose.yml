# =============================================================================
# Agent Teams - Docker Compose
#
# Quick start:
#   docker compose -f docker/docker-compose.yml up
#
# Then open http://localhost:4567 in your browser.
#
# Security note:
#   The standalone server has zero outbound network calls — no telemetry,
#   no analytics, no auto-updater. For maximum isolation, uncomment
#   network_mode below.
# =============================================================================

services:
  agent-teams-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "4567:4567"
    volumes:
      - hermit-claude-data:/data/.claude
    environment:
      - NODE_ENV=production
      - CLAUDE_ROOT=/data/.claude
      - HOST=0.0.0.0
      - PORT=4567
    restart: unless-stopped
    # Run as non-root (CLI requires non-root for --dangerously-skip-permissions)
    user: "${UID:-1000}:${GID:-1000}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment for maximum network isolation (no outbound connections):
    # network_mode: "none"

volumes:
  hermit-claude-data: